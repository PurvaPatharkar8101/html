<!-- SELECTOR type---
     1)element selector-> element using css
     2) ID selector-> id are unique and it can not be given more than one element.
     id are selected using " # ".
     3) Class selector-> class are general and can be given to more than one element.
     class are selector usiing " . "
     mostly use class selector .
     4)Universal selector:it gets applied on the colplete web page.
     it can only be applied once.
     it id selected by using ONLY " * "

     -->
     <!-- always writtten the content in div tag. -->
        <!-- always go for external css --> 



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
</head>
<body>
    <div>

        <style>

            h1{
                color: aqua;
            }

            #selector {
                color: rgb(39, 207, 207);
            }

            .selector{
                color: brown;
            }

            *{
                background-color: rgb(229, 234, 134);
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                color: blueviolet;
            }

            h1,#selector,.selector,.multi{
                font-family: cursive;
            }

            .desc{
                width: 300px;
                height: 320px;
                border: 2px dashed brown;
                text-align: center;
                background-color: aliceblue;
            }

            .desc h1{
                color: crimson;
                font-weight: 300;
                font-size: larger;
                font-family: 'Times New Roman', Times, serif;
                text-align: center;
                background-color: aliceblue;
            }

            .desc img{
                width: 250px;
            }

            .desc p{
                background-color: aliceblue;
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: small;
                font-weight: 100;
            }

            .desc button{
                background-color: red;
                color: azure;
            }

            .child{
                background-color: aliceblue;
                width: 250px;
                height: 350px;
                border: 2px solid blue;
                text-align: center;
            }

            .child>h1{
                background-color: rgb(78, 11, 213);
                font-family: 'Courier New', Courier, monospace;
                font-weight: 300;
                font-size: large;
           }

           .child>img{
                height: 200px;
                width: 200px;
           }

           .child>p{
            background-color: aliceblue;

           }

           .child>#btn{
            background-color: blue;
            color: whitesmoke;
           }

           input[type="text"]{
            background-color: black;
           }
        </style>
        <h2>Selectors in CSS</h2>
        <!-- Selectors in CSS -->

        <!-- Element Selector -->

        <h1>Element Selector</h1>


        <!-- ID Selector 
         
            1 - ID are unique and it cannot be given to more than one element
            2 - ID are selected using '#'
        -->

        <p id="selector">ID Selector</p>

        <!-- CLass Selector 
        
            1 - Class are general and can be given to more than one element
            2 - Class are selected using '.'

        -->

        <p class="selector">Class Selector</p>

        <!-- Universal Selector 
        
            1 - It gets applied on the complete web page
            2 - It can only be applied once
            3 - It is selected by using ONLY '*'
        -->

        <p>This is an example of Universal Selector</p>

        <!-- Multiple/Group Selectors -->

        <p class="multi">This is an example of Multiple / Group Selector </p>

        <!-- <p class="selector">general</p> -->

        <!-- Descendent Selector -->

        <div class="desc">
            <h1> Product </h1>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUH-oIAvcVSDEN54K4XFbmUAynW9xva-dQ0g&s" alt="img">
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Velit, ducimus sit.</p>
            <button>Read More ..</button>
        </div>

        <br>
        <br>
        <!-- Child Selector -->

        <div class="child">
            <h1> Books </h1>
            <img src="https://i.pinimg.com/736x/0a/64/f3/0a64f39c2c580704e917ce6f0f4108b3.jpg" alt="img2">

             <p>Lorem ipsum dolor sit amet.</p>
            <input type="button" value="Buy Now.." id="btn">
        </div>

        <br>
        <br>
        <!-- Attribute Selector -->

        <input type="text" placeholder="Enter your name">
    </div>
</body>
</html>
